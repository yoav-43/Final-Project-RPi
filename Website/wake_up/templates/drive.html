<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive Analytics #{{ drive.id }}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { background: #16213e; padding: 15px; border-radius: 10px; }
        .video-box { grid-column: span 2; background: #000; border-radius: 10px; text-align: center; padding: 10px; }
        video { width: 80%; max-height: 400px; border-radius: 5px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #4ecca3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← BACK TO FLEET</a>
    <h2>Analytics for Drive Session #{{ drive.id }}</h2>

    <div class="grid">
        {% if drive.video %}
        <div class="video-box">
            <h3>Session Recording (Cloudinary)</h3>
            <video controls><source src="{{ drive.video }}" type="video/mp4"></video>
        </div>
        {% endif %}

        <div class="chart-card"><h3>PERCLOS (Fatigue Score)</h3><canvas id="perclosChart"></canvas></div>
        <div class="chart-card"><h3>EAR (Eye Aspect Ratio)</h3><canvas id="earChart"></canvas></div>
        <div class="chart-card"><h3>Head Yaw (Side Movement)</h3><canvas id="yawChart"></canvas></div>
        <div class="chart-card"><h3>Head Pitch (Up/Down)</h3><canvas id="pitchChart"></canvas></div>
    </div>

    <script>
        const DRIVE_ID = {{ drive.id }};
    </script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
