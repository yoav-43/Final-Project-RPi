<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive #{{ drive.id }} Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background-color: #1e1e2f; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
        }
        
        /* Header & Navigation */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { 
            text-decoration: none; 
            color: #ffffff; 
            background: #36a2eb; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold;
        }
        .btn-back:hover { background: #2481ce; }

        /* Metadata Header */
        .meta-container {
            background: #27293d;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-left: 5px solid #d65b95;
        }
        .meta-item { text-align: center; }
        .meta-label { color: #9a9a9a; font-size: 0.9rem; }
        .meta-val { font-size: 1.2rem; font-weight: bold; }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: #27293d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .card h3 { margin-top: 0; color: #d1d1d1; border-bottom: 1px solid #3d3d5c; padding-bottom: 10px;}
        canvas { max-height: 250px; width: 100%; }

        /* Alert Counters */
        .kpi-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-card { flex: 1; background: #27293d; padding: 20px; border-radius: 10px; text-align: center; }
        .kpi-num { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="/" class="btn-back">← Back to Fleet</a>
        <h2>Session Analysis: #{{ drive.id }}</h2>
    </div>

    <div class="meta-container">
        <div class="meta-item">
            <div class="meta-label">Device ID</div>
            <div class="meta-val">{{ drive.device }}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">Start Time</div>
            <div class="meta-val">{{ drive.start }}</div>
        </div>
        <div class="meta-item">
            <div class="meta-label">End Time</div>
            <div class="meta-val">{{ drive.end }}</div>
        </div>
    </div>

    <div class="kpi-row">
        <div class="kpi-card">
            <h3>Fatigue Alerts</h3>
            <div id="fatigueCount" class="kpi-num" style="color: #ff6384;">0</div>
        </div>
        <div class="kpi-card">
            <h3>Distraction Events</h3>
            <div id="distractionCount" class="kpi-num" style="color: #36a2eb;">0</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><canvas id="perclosChart"></canvas></div>
        <div class="card"><canvas id="faceChart"></canvas></div>
        <div class="card"><canvas id="headChart"></canvas></div>
        <div class="card"><canvas id="alertsChart"></canvas></div>
    </div>

    <script>const DRIVE_ID = {{ drive.id }};</script>
    <script src="/static/dashboard.js"></script>
</body>
</html>
