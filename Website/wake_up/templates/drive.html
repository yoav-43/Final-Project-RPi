<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive #{{ drive.id }} Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background-color: #1e1e2f; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px; 
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { 
            text-decoration: none; 
            color: #ffffff; 
            background: #36a2eb; 
            padding: 10px 20px; 
            border-radius: 5px; 
            font-weight: bold;
        }
        
        .card {
            background: #27293d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item { text-align: center; }
        .meta-label { color: #9a9a9a; font-size: 0.8rem; text-transform: uppercase; }
        .meta-val { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* Video Player Styling */
        .video-container { text-align: center; }
        video {
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            border: 2px solid #3d3d5c;
            background: #000;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        canvas { max-height: 300px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="/" class="btn-back">← Back to Fleet</a>
        <h2>Session Analysis: #{{ drive.id }}</h2>
    </div>

    <div class="card meta-grid">
        <div class="meta-item"><div class="meta-label">Device</div><div class="meta-val">{{ drive.device }}</div></div>
        <div class="meta-item"><div class="meta-label">Start</div><div class="meta-val">{{ drive.start }}</div></div>
        <div class="meta-item"><div class="meta-label">End</div><div class="meta-val">{{ drive.end }}</div></div>
        <div class="meta-item"><div class="meta-label">Total Alerts</div><div class="meta-val" style="color: #ff6384;">{{ drive.alerts }}</div></div>
    </div>

    {% if drive.video_url %}
    <div class="card video-container">
        <h3 style="margin-top: 0;">Drive Recording</h3>
        <video controls>
            <source src="{{ drive.video_url }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    {% endif %}

    <div class="dashboard-grid">
        <div class="card">
            <h3>PERCLOS (Drowsiness)</h3>
            <canvas id="perclosChart"></canvas>
        </div>
        <div class="card">
            <h3>Alert Timeline</h3>
            <canvas id="alertsChart"></canvas>
        </div>
    </div>

    <script>
        const DRIVE_ID = {{ drive.id }};
    </script>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>

</body>
</html>
