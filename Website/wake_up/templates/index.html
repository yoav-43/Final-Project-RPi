<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Fatigue Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f4f7f6; }
        h1 { color: #333; }
        .container { 
            width: 90%; 
            max-width: 800px;
            margin: 20px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        canvas { max-height: 400px; }
        .status-box { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <h1>Live Driver Fatigue Status</h1>
    <div class="container">
        <canvas id="fatigueChart"></canvas>
        <div class="status-box">
            Real-time monitoring of PERCLOS (Fatigue) and MAR (Yawning)
        </div>
    </div>
    <script src="/static/dashboard.js"></script>
</body>
</html>
